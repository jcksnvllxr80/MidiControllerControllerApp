name: Release

# Build native installers for every OS and attach them to a GitHub Release.
# Trigger by pushing a version tag, e.g.:
#     npm version patch        # bumps package.json + tags vX.Y.Z
#     git push --follow-tags
# (or run manually from the Actions tab via "Run workflow").
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write # needed to create the Release and upload installers
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon (.dmg)
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest # Intel (.dmg)
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04 # .deb + .AppImage
            args: ''
          - platform: windows-latest # .exe (NSIS) + .msi
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          # macOS builds both arches; other platforms use the host target.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: npm ci

      - name: Build app + installers, attach to a draft Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Code signing (uncomment + add the repo secrets when you have certs) ---
          # macOS (Apple Developer account → sign + notarize so there's no Gatekeeper warning):
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows (Authenticode → no SmartScreen warning): set
          # bundle.windows.certificateThumbprint (+ optional signCommand) in tauri.conf.json.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MidiController Controller ${{ github.ref_name }}'
          releaseBody: |
            Download the installer for your operating system below:
            - **Windows** — the `…-setup.exe` (double-click, click through the wizard).
            - **macOS** — the `.dmg` (open it, drag the app to Applications). Pick the build
              matching your chip (Apple Silicon vs Intel).
            - **Linux** — the `.deb` (double-click to install) or the portable `.AppImage`.

            > Installers aren't code-signed yet, so the first launch shows an OS warning
            > (Windows SmartScreen → "More info → Run anyway"; macOS → right-click → Open).
          releaseDraft: true # review, then publish from the Releases page
          prerelease: false
          args: ${{ matrix.args }}
